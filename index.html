<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>近代史 · 极速突击</title>
<style>
/* 🎨 暗夜霓虹 · NEO-GLASS Design System */
:root {
  /* Backgrounds */
  --bg-deep: #07070d;
  --bg: #0a0a14;
  --bg-elevated: #0f0f1e;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.07);

  /* Neon palette */
  --cyan: #00d4ff;
  --cyan-dim: rgba(0,212,255,0.15);
  --purple: #7c3aed;
  --purple-dim: rgba(124,58,237,0.15);
  --pink: #f472b6;
  --pink-dim: rgba(244,114,182,0.12);
  --accent-gradient: linear-gradient(135deg, #00d4ff, #7c3aed);

  /* Functional */
  --correct: #10b981;
  --correct-dim: rgba(16,185,129,0.15);
  --wrong: #ef4444;
  --wrong-dim: rgba(239,68,68,0.15);
  --gold: #f59e0b;
  --gold-dim: rgba(245,158,11,0.15);

  /* Text */
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;

  /* Geometry */
  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --radius-xs: 8px;

  /* Backward compatibility */
  --accent2: var(--gold);
  --card2: rgba(255,255,255,0.04);
  --text2: var(--text-dim);
  --card: rgba(255,255,255,0.04);

  /* Sizing */
  --nav-h: 64px;
  --header-h: 54px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + 40px);
  overflow-x: hidden;
  line-height: 1.6;
}

/* Subtle background noise */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.06), transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.05), transparent);
  pointer-events: none;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 12px 20px;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(7,7,13,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
}
.header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header h1 span { -webkit-text-fill-color: transparent; }

/* ===== GLASS CARD ===== */
.glass {
  background: var(--glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 20px;
  margin-bottom: 12px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.glass:active { transform: none; }

/* ===== BOTTOM NAV ===== */
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  padding-bottom: env(safe-area-inset-bottom, 0);
  background: rgba(7,7,13,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--glass-border);
  display: flex;
  z-index: 200;
}
.nav a {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  text-decoration: none;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 500;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  padding: 6px 0 4px;
}
.nav a .nav-icon {
  font-size: 22px;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.nav a.active {
  color: var(--text);
}
.nav a.active .nav-icon {
  transform: translateY(-2px) scale(1.1);
}
/* Active indicator */
.nav a.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  border-radius: 0 0 4px 4px;
  background: var(--accent-gradient);
  transition: all 0.3s;
}
.nav a .nav-label {
  font-size: 10px;
  opacity: 0.7;
}
.nav a.active .nav-label { opacity: 1; }

/* ===== CONTENT ===== */
.content {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 12px 16px 20px;
}

/* ===== STATS GRID ===== */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 16px 12px;
  text-align: center;
  transition: all 0.3s ease;
}
.stat-card:active { transform: scale(0.96); }
.stat-card .num {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
}
.stat-card .num.cyan { color: var(--cyan); }
.stat-card .num.purple { color: var(--purple); }
.stat-card .num.gold { color: var(--gold); }
.stat-card .num.pink { color: var(--pink); }
.stat-card .num.green { color: var(--correct); }
.stat-card .num.red { color: var(--wrong); }
.stat-card .label {
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 500;
  margin-top: 2px;
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
  height: 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  margin: 10px 0;
}
.progress-bar .fill {
  height: 100%;
  border-radius: 4px;
  background: var(--accent-gradient);
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

/* ===== BUTTONS ===== */
.btn {
  padding: 14px 22px;
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.3px;
}
.btn-primary {
  background: var(--accent-gradient);
  color: #fff;
  box-shadow: 0 4px 20px rgba(0,212,255,0.2);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,212,255,0.3); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  background: var(--glass);
  backdrop-filter: blur(8px);
  color: var(--text);
  border: 1px solid var(--glass-border);
}
.btn-secondary:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.15); }
.btn-secondary:active { transform: scale(0.97); }
.btn-block { width: 100%; justify-content: center; }
.btn-sm { padding: 10px 16px; font-size: 12px; border-radius: var(--radius-sm); }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: rgba(15,15,30,0.95);
  backdrop-filter: blur(20px);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  border: 1px solid var(--glass-border);
  border-bottom: none;
  padding: 28px 24px;
  max-width: 480px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ===== INPUTS ===== */
input, textarea, select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  transition: all 0.2s;
}
input:focus, textarea:focus {
  border-color: var(--cyan);
  outline: none;
  box-shadow: 0 0 0 3px var(--cyan-dim);
}
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }

/* ===== BADGES ===== */
.badge {
  display: inline-flex;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-single { background: rgba(0,212,255,0.12); color: var(--cyan); border: 1px solid rgba(0,212,255,0.2); }
.badge-multi { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(124,58,237,0.2); }
.badge-judge { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }

/* ===== QUESTION CARD ===== */
.q-card {
  background: var(--glass);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 20px;
  margin-bottom: 12px;
}
.q-card .meta { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.q-card .q-title {
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 14px;
  font-weight: 500;
  color: var(--text);
}
.q-card .options { display: flex; flex-direction: column; gap: 8px; }
.q-card .option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 16px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  background: rgba(255,255,255,0.02);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
@media (hover: hover) {
  .q-card .option:hover {
    border-color: rgba(0,212,255,0.3);
    background: var(--cyan-dim);
  }
}
.q-card .option .olabel {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.06);
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
  transition: all 0.2s;
}
.q-card .option .otext { line-height: 1.5; font-size: 14px; padding-top: 3px; color: var(--text-dim); }
.q-card .option.correct {
  border-color: var(--correct) !important;
  background: var(--correct-dim) !important;
}
.q-card .option.correct .olabel { background: var(--correct) !important; color: #fff; }
.q-card .option.wrong {
  border-color: var(--wrong) !important;
  background: var(--wrong-dim) !important;
}
.q-card .option.wrong .olabel { background: var(--wrong) !important; color: #fff; }
.q-card .option.disabled { cursor: default; opacity: 0.6; }
.q-card .option.disabled:hover { border-color: var(--glass-border); background: rgba(255,255,255,0.02); }
.q-card .option.selected-multi {
  border-color: var(--cyan) !important;
  background: var(--cyan-dim) !important;
}
.q-card .option.selected-multi .olabel { background: var(--cyan) !important; color: #fff; }

.q-card .feedback {
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  display: none;
  animation: fadeIn 0.2s ease;
}
.q-card .feedback.show { display: block; }
.q-card .feedback.correct {
  background: var(--correct-dim);
  color: var(--correct);
  border: 1px solid rgba(16,185,129,0.2);
}
.q-card .feedback.wrong {
  background: var(--wrong-dim);
  color: var(--wrong);
  border: 1px solid rgba(239,68,68,0.2);
}

/* ===== SWIPE CARD ===== */
.q-card-wrap { position: relative; overflow: hidden; margin-bottom: 12px; }
.q-card-wrap .q-card { margin-bottom: 0; will-change: transform; }
.q-card-wrap .q-card.snap { transition: transform 0.4s cubic-bezier(0.22,1,0.36,1); }
.q-card-wrap .q-card-next { position: absolute; top: 0; left: 0; width: 100%; transform: translateX(100%); opacity: 0.8; }
.q-card-wrap .q-card-next.enter { transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.35s ease; }

/* ===== MASTERY BAR ===== */
.mastery-bar {
  height: 3px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  margin: 8px 0;
  overflow: hidden;
}
.mastery-bar .fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.mastery-bar .fill.low { background: var(--wrong); }
.mastery-bar .fill.mid { background: var(--gold); }
.mastery-bar .fill.high { background: var(--correct); }
.mastery-label { font-size: 11px; color: var(--text-muted); }

/* ===== QUESTION GRID ===== */
.qgrid-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.qgrid-tabs button {
  flex: 1; padding: 8px 0; border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); background: var(--glass);
  color: var(--text-dim); font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.qgrid-tabs button.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
.qgrid-tabs button:active { transform: scale(0.96); }
.qgrid-container {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  padding: 8px 0;
}
.qgrid-item { width: 40px; height: 40px; border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; cursor: pointer;
  background: rgba(255,255,255,0.04); color: var(--text-muted);
  border: 1px solid var(--glass-border);
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  user-select: none; position: relative;
}
.qgrid-item:active { transform: scale(0.85); }
.qgrid-item.selected { outline: 2px solid var(--cyan); outline-offset: 1px; box-shadow: 0 0 12px var(--cyan-dim); }
.qgrid-item.correct { background: var(--correct-dim); border-color: var(--correct); color: var(--correct); }
.qgrid-item.wrong { background: var(--wrong-dim); border-color: var(--wrong); color: var(--wrong); }
.qgrid-item.mixed { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.qgrid-item.current { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
.qgrid-item.starred::after { content: '⭐'; position: absolute; top: -4px; right: -4px; font-size: 8px; }
.qgrid-legend { display: flex; gap: 16px; justify-content: center; margin-top: 10px; font-size: 12px; color: var(--text-dim); }
.qgrid-legend span { display: flex; align-items: center; gap: 4px; }
.qgrid-legend .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
.qgrid-legend .dot.dot-correct { background: var(--correct-dim); border: 1px solid var(--correct); }
.qgrid-legend .dot.dot-wrong { background: var(--wrong-dim); border: 1px solid var(--wrong); }
.qgrid-legend .dot.dot-mixed { background: var(--gold-dim); border: 1px solid var(--gold); }
.qgrid-legend .dot.dot-unseen { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); }

/* ===== BOOKMARK ===== */
.bookmark-btn { background: none; border: none; font-size: 18px; cursor: pointer;
  padding: 2px 4px; transition: transform 0.2s; line-height: 1; }
.bookmark-btn:active { transform: scale(0.85); }
.btn-ai-sm { background: none; border: none; font-size: 16px; cursor: pointer; padding: 2px 4px; line-height: 1; }
.btn-ai-sm:active { transform: scale(0.85); }
.review-grid { margin-top: 12px; }
.bookmark-btn.active { color: var(--gold); }
.bookmark-btn.inactive { color: var(--text-muted); opacity: 0.35; }

/* ===== REVIEW MODE ===== */
.reveal-answer {
  background: var(--correct-dim); color: var(--correct);
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; margin-top: 12px;
  border: 1px solid rgba(16,185,129,0.2);
}

/* ===== SETTING ITEMS ===== */
.setting-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--glass-border);
}
.setting-item:last-child { border-bottom: none; }
.setting-item .si-label { font-size: 14px; }
.setting-item .si-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ===== AI BOX ===== */
.ai-box {
  background: linear-gradient(135deg, rgba(0,212,255,0.06), rgba(124,58,237,0.06));
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-top: 12px;
  display: none;
  animation: fadeIn 0.3s ease;
}
.ai-box.show { display: block; }
.ai-box .ai-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 13px;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.ai-box .ai-content { font-size: 13px; line-height: 1.7; color: var(--text-dim); -webkit-text-fill-color: var(--text-dim); }
.ai-box .ai-loading { display: flex; gap: 6px; align-items: center; padding: 8px 0; }
.ai-box .ai-loading .dot {
  width: 6px; height: 6px;
  background: var(--cyan);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.ai-box .ai-loading .dot:nth-child(2) { animation-delay: 0.2s; }
.ai-box .ai-loading .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

/* ===== WRONG ITEM ===== */
.wrong-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.25s ease;
  background: rgba(255,255,255,0.02);
}
.wrong-item:hover { border-color: rgba(0,212,255,0.2); background: var(--cyan-dim); transform: translateX(4px); }
.wrong-item .wi-num { font-size: 12px; color: var(--text-muted); min-width: 28px; }
.wrong-item .wi-title { flex: 1; font-size: 13px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-dim); }
.wrong-item .wi-count { font-size: 12px; color: var(--wrong); min-width: 30px; text-align: right; font-weight: 600; }

/* ===== WRONG GRID ===== */
.wrong-grid-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.wrong-grid-bar .wgb-item { flex: 1; text-align: center; background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 8px 4px; }
.wrong-grid-bar .wgb-item .wgb-num { font-size: 22px; font-weight: 800; }
.wrong-grid-bar .wgb-item .wgb-label { font-size: 10px; color: var(--text-muted); }

/* Eliminate progress */
.eliminate-bar { height: 8px; border-radius: 6px; background: var(--wrong-dim); overflow: hidden; margin: 8px 0; }
.eliminate-bar .fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--wrong), var(--gold), var(--correct)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

/* Wrong grid item specific */
.qgrid-item.deep-wrong { background: rgba(185,28,28,0.3); border-color: #b91c1c; color: #fca5a5; }

/* ===== EMPTY STATE ===== */
/* Spinner */
.spinner {
  display: inline-block;
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 60px 20px; }
.empty .icon { font-size: 40px; margin-bottom: 10px; }
.empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.empty p { color: var(--text-muted); font-size: 13px; }

/* ===== DIVIDER ===== */
.divider { height: 1px; background: var(--glass-border); margin: 16px 0; }

/* ===== PAGE TRANSITION ===== */
.page-enter {
  animation: pageIn 0.35s cubic-bezier(0.4,0,0.2,1);
}

<body>
<div class="header">
  <h1>📖 近代史 · <span>极速突击</span></h1>
</div>
<div class="content" id="app"></div>
<div class="nav" id="nav">
  <a href="#" data-page="dashboard" onclick="App.nav('dashboard')">
    <span class="nav-icon">🏠</span><span class="nav-label">首页</span>
  </a>
  <a href="#" data-page="quiz" onclick="App.nav('quiz')">
    <span class="nav-icon">📝</span><span class="nav-label">刷题</span>
  </a>
  <a href="#" data-page="wrongbook" onclick="App.nav('wrongbook')">
    <span class="nav-icon">📕</span><span class="nav-label">错题</span>
  </a>
  <a href="#" data-page="grid" onclick="App.nav('grid')">
    <span class="nav-icon">🔢</span><span class="nav-label">题号</span>
  </a>
  <a href="#" data-page="stats" onclick="App.nav('stats')">
    <span class="nav-icon">📊</span><span class="nav-label">统计</span>
  </a>
  <a href="#" data-page="settings" onclick="App.nav('settings')">
    <span class="nav-icon">⚙️</span><span class="nav-label">设置</span>
  </a>
</div>

<script>
// ===== 题库从外部加载（questions.js）=====
let QUESTION_BANK = null;

// 动态加载题库数据
function loadQuestionBank() {
  const appDiv = document.getElementById('app');
  if (appDiv) appDiv.innerHTML = '<div class="loading" style="text-align:center;padding:60px"><div class="spinner"></div><p style="color:var(--text-dim);margin-top:12px">加载题库中...</p></div>';
  const script = document.createElement('script');
  script.src = 'questions.js';
  script.onload = () => {
    QUESTION_BANK = window.QUESTION_BANK;
    if (!QUESTION_BANK || !QUESTION_BANK.questions) {
      if (appDiv) appDiv.innerHTML = '<div class="empty"><div class="icon">❌</div><h3>加载失败</h3><p>请确保 questions.js 在同一目录下</p></div>';
      return;
    }
    // 启动时清理过期日志
    Store.cleanOldData();
    App.nav('dashboard');
  };
  script.onerror = () => {
    if (appDiv) appDiv.innerHTML = '<div class="empty"><div class="icon">❌</div><h3>加载失败</h3><p>无法加载 questions.js，请检查文件是否存在</p></div>';
  };
  document.head.appendChild(script);
}


// ===== 存储工具 =====
const Store = {
  get(key, def) {
    try { const d = localStorage.getItem('quizMastery'); return d ? (JSON.parse(d)[key] ?? def) : def; }
    catch { return def; }
  },
  set(key, val) {
    try {
      const d = JSON.parse(localStorage.getItem('quizMastery') || '{}');
      d[key] = val;
      localStorage.setItem('quizMastery', JSON.stringify(d));
    } catch {
      // 写入失败时自动清理旧日志后重试一次
      try {
        const d = JSON.parse(localStorage.getItem('quizMastery') || '{}');
        if (d.stats && Array.isArray(d.stats.dailyLog) && d.stats.dailyLog.length > 60) {
          d.stats.dailyLog.sort((a, b) => a.date < b.date ? 1 : -1);
          d.stats.dailyLog = d.stats.dailyLog.slice(0, 60);
          d.stats = d.stats;
          d[key] = val;
          localStorage.setItem('quizMastery', JSON.stringify(d));
        }
      } catch {}
    }
  },
  // 每月清理一次过期日志（主动调用）
  cleanOldData() {
    try {
      const d = JSON.parse(localStorage.getItem('quizMastery') || '{}');
      const st = d.stats;
      if (st && Array.isArray(st.dailyLog) && st.dailyLog.length > 60) {
        st.dailyLog.sort((a, b) => a.date < b.date ? 1 : -1);
        st.dailyLog = st.dailyLog.slice(0, 60);
        d.stats = st;
        localStorage.setItem('quizMastery', JSON.stringify(d));
      }
      try { const p = JSON.parse(localStorage.getItem('quizProgress') || 'null'); if (p && Date.now() - p.timestamp > 48 * 60 * 60 * 1000) localStorage.removeItem('quizProgress'); } catch {}
    } catch {}
  },
  get mastery() { return this.get('mastery', {}); },
  set mastery(v) { this.set('mastery', v); },
  get settings() { return this.get('settings', { apiKey: '', dailyGoal: 50, smartMode: 'speed20' }); },
  set settings(v) { this.set('settings', v); },
  get stats() { return this.get('stats', { sessions: 0, totalAnswered: 0, totalCorrect: 0, dailyLog: [] }); },
  set stats(v) { this.set('stats', v); }
};

// ===== AI 工具 =====
const AI = {
  async call(prompt) {
    const apiKey = Store.settings.apiKey;
    if (!apiKey) return '请在设置中填入 DeepSeek API Key';
    // 创建 AbortController 实现超时
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000); // 15秒超时
    try {
      const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        signal: controller.signal,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'deepseek-chat',
          messages: [
            { role: 'system', content: '你是一个考试辅导助手，帮助学生高效备考。回答简洁、直接、有用。' },
            { role: 'user', content: prompt }
          ],
          temperature: 0.7,
          max_tokens: 1000
        })
      });
      clearTimeout(timeoutId);
      if (!resp.ok) return `API 请求失败 (${resp.status}): ${resp.statusText}`;
      const data = await resp.json();
      if (data.error) return `API 错误: ${data.error.message}`;
      return data.choices?.[0]?.message?.content || '无响应';
    } catch (e) {
      if (e.name === 'AbortError') return '⏱️ 请求超时，请检查网络或 API Key 是否正确';
      return `请求失败: ${e.message}`;
    }
  }
};

// ===== 主应用 =====
const App = {
  currentPage: 'dashboard',
  quizState: { mode: 'all', questions: [], idx: 0, answered: false, selected: null,
    isCorrect: false, sessionStats: { correct: 0, wrong: 0, total: 0 }, startOpts: {}, answers: {} },
  _gridFilter: 'all',
  _gridSelected: null,
  _reviewGridOpen: true,

  // 过滤 HTML 标签
  sanitize(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  },

  // 自定义弹窗
  showModal(title, msg, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay show';
    overlay.innerHTML = `
      <div class="modal">
        <h3 style="font-size:18px;margin-bottom:8px">${title}</h3>
        <p style="color:var(--text-dim);font-size:14px;line-height:1.6">${msg}</p>
        <div class="btn-group" style="margin-top:16px">
          ${onConfirm ? `<button class="btn btn-primary btn-block" id="modalConfirm">确定</button>` : ''}
          <button class="btn btn-secondary btn-block" id="modalClose">${onConfirm ? '取消' : '知道了'}</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('modalClose').onclick = () => overlay.remove();
    if (onConfirm) document.getElementById('modalConfirm').onclick = () => { overlay.remove(); onConfirm(); };
  },

  // 收藏/取消收藏
  toggleBookmark(qId) {
    const m = this.getMastery(qId);
    m.starred = !m.starred;
    Store.mastery = { ...Store.mastery, [qId]: m };
    this.renderQuiz();
  },
  getBookmarkedCount() {
    const qs = QUESTION_BANK.questions || [];
    return qs.filter(q => Store.mastery[q.序号]?.starred).length;
  },
  getBookmarked() {
    const qs = QUESTION_BANK.questions || [];
    return qs.filter(q => Store.mastery[q.序号]?.starred);
  },
  // 获取错题列表
  getWrongQuestions() {
    const qs = QUESTION_BANK.questions || [];
    return qs.filter(q => {
      const m = Store.mastery[q.序号];
      return m && m.wrongStreak >= 1;
    });
  },
  // 错题统计
  getWrongStats() {
    const wrong = this.getWrongQuestions();
    const m = Store.mastery;
    let totalWrongEver = 0, eliminated = 0;
    for (const q of (QUESTION_BANK.questions || [])) {
      const mm = m[q.序号];
      if (mm?.everWrong) {
        totalWrongEver++;
        if (!mm.wrongStreak || mm.wrongStreak <= 0) eliminated++;
      }
    }
    return { current: wrong.length, totalEver: totalWrongEver, eliminated, avgWrong: wrong.reduce((s,q) => s + ((m[q.序号]?.wrongStreak) || 0), 0) / Math.max(1, wrong.length) };
  },

  // 考前速览（支持 filter: 'all' 或 'wrong'）
  startReview(filter) {
    let qs;
    if (filter === 'wrong') {
      qs = this.getWrongQuestions();
      if (qs.length === 0) { App.showModal('提示', '🎉 没有错题！'); return; }
    } else {
      qs = QUESTION_BANK.questions || [];
    }
    this.quizState = {
      mode: 'review', questions: [...qs], idx: 0, answered: true,
      selected: null, isCorrect: true,
      sessionStats: { correct: 0, wrong: 0, total: qs.length },
      answers: {}, startOpts: { filter }
    };
    this.nav('quiz');
  },

  // 错题刷题模式（随机+题号网格）
  startWrongMode(opts) {
    const wrong = this.getWrongQuestions();
    if (wrong.length === 0) { App.showModal('提示', '🎉 没有错题！'); return; }
    let questions = [...wrong];
    // 随机打乱
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    // 检查是否有未完成的进度
    const saved = this._loadWrongProgress();
    this.quizState = {
      mode: 'wrong', questions, idx: 0, answered: false,
      selected: null, isCorrect: false,
      sessionStats: { correct: 0, wrong: 0, total: questions.length },
      startOpts: opts || {}, answers: {}
    };

    if (saved && saved.idx > 0 && saved.total === wrong.length) {
      App.showModal('继续上次', `上次做到第 ${saved.idx + 1}/${saved.total} 题（答对 ${saved.correct}，答错 ${saved.wrong}）是否继续？`, () => {
        this.quizState.idx = Math.min(saved.idx, questions.length - 1);
        this.quizState.sessionStats.correct = saved.correct || 0;
        this.quizState.sessionStats.wrong = saved.wrong || 0;
        this.nav('quiz');
      });
      // 不点「继续」的话就从第一题开始
      setTimeout(() => {
        if (this.currentPage !== 'quiz') this.nav('quiz');
      }, 100);
    } else {
      this.nav('quiz');
    }
  },

  // 错题进度保存/恢复
  _saveWrongProgress() {
    try {
      const s = this.quizState;
      if (s.mode !== 'wrong' || !s.questions || s.questions.length === 0) return;
      localStorage.setItem('wrongProgress', JSON.stringify({
        idx: s.idx,
        total: s.sessionStats.total,
        correct: s.sessionStats.correct,
        wrong: s.sessionStats.wrong,
        timestamp: Date.now()
      }));
    } catch {}
  },
  _loadWrongProgress() {
    try {
      const d = localStorage.getItem('wrongProgress');
      if (!d) return null;
      const p = JSON.parse(d);
      if (Date.now() - p.timestamp > 48 * 60 * 60 * 1000) { localStorage.removeItem('wrongProgress'); return null; }
      return p;
    } catch { return null; }
  },
  _clearWrongProgress() {
    try { localStorage.removeItem('wrongProgress'); } catch {}
  },

  // 搜索题目
  searchQuestions() {
    const input = document.getElementById('searchInput');
    if (!input) return;
    const keyword = input.value.trim();
    if (!keyword) { App.showModal('提示', '请输入搜索关键词'); return; }
    const qs = QUESTION_BANK.questions || [];
    const kw = keyword.toLowerCase();
    const matched = qs.filter(q =>
      (q.题目 || '').toLowerCase().includes(kw) ||
      ['选项A','选项B','选项C','选项D','选项E','选项F'].some(k => (q[k]||'').toLowerCase().includes(kw))
    );
    if (matched.length === 0) { App.showModal('提示', `没有找到包含"${keyword}"的题目`); return; }
    this.quizState = {
      mode: 'search', questions: matched, idx: 0, answered: false,
      selected: null, isCorrect: false,
      sessionStats: { correct: 0, wrong: 0, total: matched.length },
      startOpts: {}, answers: {}
    };
    this.nav('quiz');
  },

  // 保存/恢复刷题进度
  saveQuizProgress() {
    try {
      const s = this.quizState;
      if (!s.questions || s.questions.length === 0) return;
      const payload = {
        idx: s.idx,
        total: s.sessionStats.total,
        correct: s.sessionStats.correct,
        wrong: s.sessionStats.wrong,
        mode: s.mode,
        modeText: s.mode === 'wrong' ? '错题重刷' : s.mode === 'speed20' ? '速刷20题' : s.mode === 'review' ? '考前速览' : s.mode === 'search' ? '搜索' : s.mode === 'bookmark' ? '收藏复习' : '顺序刷',
        timestamp: Date.now()
      };
      localStorage.setItem('quizProgress', JSON.stringify(payload));
      if (s.mode === 'wrong') this._saveWrongProgress();
    } catch {}
  },
  loadQuizProgress() {
    try {
      const d = localStorage.getItem('quizProgress');
      if (!d) return null;
      const p = JSON.parse(d);
      // 超过2小时过期
      if (Date.now() - p.timestamp > 2 * 60 * 60 * 1000) { localStorage.removeItem('quizProgress'); return null; }
      return p;
    } catch { return null; }
  },
  resumeQuiz() {
    const saved = this.loadQuizProgress();
    if (!saved) { App.showModal('提示', '没有找到上次的进度'); return; }
    const qs = QUESTION_BANK.questions || [];
    let filtered = [];
    if (saved.mode === 'wrong') filtered = qs.filter(q => { const m = Store.mastery[q.序号]; return m && m.wrongStreak >= 1; });
    else if (saved.mode === 'bookmark') filtered = qs.filter(q => Store.mastery[q.序号]?.starred);
    else filtered = [...qs];
    const realIdx = Math.min(saved.idx, filtered.length - 1);
    this.quizState = {
      mode: saved.mode, questions: filtered, idx: realIdx, answered: true,
      selected: null, isCorrect: false,
      sessionStats: { correct: saved.correct || 0, wrong: saved.wrong || 0, total: filtered.length },
      startOpts: {}, answers: {}
    };
    this.nav('quiz');
  },

  // 获取题目的掌握数据
  getMastery(qId) {
    const m = Store.mastery[qId] || { level: 0, attempts: 0, correct: 0, wrongStreak: 0, lastSeen: null, manual: null, everWrong: false };
    return m;
  },
  updateMastery(qId, correct) {
    const m = this.getMastery(qId);
    m.attempts++;
    if (correct) { m.correct++; m.wrongStreak = 0; }
    else { m.wrongStreak++; m.everWrong = true; }
    m.lastSeen = new Date().toISOString();
    // Auto-calculate level
    const ratio = m.attempts > 0 ? m.correct / m.attempts : 0;
    if (m.wrongStreak >= 2) m.level = Math.max(0.1, ratio * 0.5);
    else if (m.attempts >= 4 && ratio >= 1) m.level = 1;
    else if (m.attempts >= 3 && ratio >= 0.8) m.level = Math.max(0.6, ratio);
    else m.level = Math.max(0.1, ratio * 0.6);
    // Manual override takes precedence
    if (m.manual === 'mastered') m.level = 1;
    else if (m.manual === 'dontKnow') m.level = Math.min(m.level, 0.2);
    Store.mastery = { ...Store.mastery, [qId]: m };
  },

  // 导航
  nav(page) {
    this.currentPage = page;
    document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
    this.render();
  },

  // 渲染入口
  render() {
    if (!QUESTION_BANK || !QUESTION_BANK.questions) return;
    const page = this.currentPage;
    if (page === 'dashboard') this.renderDashboard();
    else if (page === 'quiz') this.renderQuiz();
    else if (page === 'wrongbook') this.renderWrongBook();
    else if (page === 'grid') this.renderQuestionGrid();
    else if (page === 'stats') this.renderStats();
    else if (page === 'settings') this.renderSettings();
  },

  // ===== 首页面板 =====
  renderDashboard() {
    const m = Store.mastery;
    const qs = QUESTION_BANK.questions || [];
    const total = qs.length;
    const mastered = qs.filter(q => (m[q.序号]?.level || 0) >= 0.8).length;
    const notSeen = qs.filter(q => !m[q.序号]?.attempts).length;
    const wrong = qs.filter(q => (m[q.序号]?.wrongStreak || 0) >= 1 || (m[q.序号]?.level || 0) < 0.3).length;
    const pct = total > 0 ? Math.round(mastered / total * 100) : 0;
    const s = Store.stats;
    // 今日数据
    const today = new Date().toISOString().slice(0,10);
    const todayLog = (s.dailyLog || []).find(d => d.date === today);
    const todayCorrect = todayLog?.correct || 0;
    const todayAnswered = todayLog?.answered || 0;
    const todayRate = todayAnswered > 0 ? Math.round(todayCorrect / todayAnswered * 100) : 0;

    document.getElementById('app').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="num gold">${pct}%</div><div class="label">总体掌握度</div></div>
        <div class="stat-card"><div class="num green">${mastered}</div><div class="label">已掌握 / ${total}</div></div>
        <div class="stat-card"><div class="num" style="color:#888">${notSeen}</div><div class="label">未刷过</div></div>
        <div class="stat-card"><div class="num red">${wrong}</div><div class="label">需要巩固</div></div>
      </div>

      <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>

      <!-- 继续上次 -->
      ${(() => {
        const saved = App.loadQuizProgress();
        if (saved) return `
        <div class="glass" style="border-color:var(--cyan);background:var(--cyan-dim)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="font-size:15px;font-weight:600">▶️ 继续上次</span>
              <div style="font-size:12px;color:var(--text-dim);margin-top:2px">第${saved.idx+1}/${saved.total}题 · ${saved.modeText}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="App.resumeQuiz()">继续 →</button>
          </div>
        </div>`;
        return '';
      })()}

      <!-- 搜索题目 -->
      <div class="glass">
        <h3 style="font-size:15px;margin-bottom:10px">🔍 搜题</h3>
        <div style="display:flex;gap:8px">
          <input type="text" id="searchInput" placeholder="输入关键词搜题..." style="flex:1">
          <button class="btn btn-primary" onclick="App.searchQuestions()">搜索</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">回车搜索，搜索后自动进入刷题</div>
      </div>

      ${(() => {
        const ws = App.getWrongStats();
        const eliminatePct = ws.totalEver > 0 ? Math.round(ws.eliminated / ws.totalEver * 100) : 0;
        return `
        <div class="glass" style="border-color:rgba(239,68,68,0.2)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:15px;font-weight:600">📕 错题本</span>
            <span style="font-size:12px;color:var(--text-dim)">已消灭 ${ws.eliminated} 题</span>
          </div>
          <div class="wrong-grid-bar">
            <div class="wgb-item"><div class="wgb-num" style="color:var(--wrong)">${ws.current}</div><div class="wgb-label">当前错题</div></div>
            <div class="wgb-item"><div class="wgb-num" style="color:var(--gold)">${ws.avgWrong.toFixed(1)}</div><div class="wgb-label">平均错次</div></div>
            <div class="wgb-item"><div class="wgb-num" style="color:var(--correct)">${ws.eliminated}</div><div class="wgb-label">已纠正</div></div>
          </div>
          <div class="eliminate-bar"><div class="fill" style="width:${eliminatePct}%"></div></div>
          <div class="btn-group" style="margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-primary btn-sm" style="flex:1" onclick="App.startWrongMode()">🔀 随机刷</button>
            <button class="btn btn-secondary btn-sm" style="flex:1" onclick="App.startReview('wrong')">📖 只看答案</button>
            <button class="btn btn-secondary btn-sm" style="flex:1" onclick="App.nav('wrongbook')">📋 错题本</button>
          </div>
        </div>`;
      })()}

      <div class="glass">
        <h3 style="font-size:15px;margin-bottom:10px">⚡ 快速开始</h3>
        <div class="btn-group" style="flex-direction:column">
          <button class="btn btn-primary btn-block" onclick="App.startMode('speed20')">
            🚀 20题速刷 · 专攻最不会的
          </button>
          <button class="btn btn-secondary btn-block" onclick="App.startReview()">
            📖 考前速览 · 全部题
          </button>
          <button class="btn btn-secondary btn-block" onclick="App.startMode('all')">
            📚 全部顺序刷
          </button>
          <button class="btn btn-secondary btn-block" onclick="App.showAIPlan()">
            🤖 AI 定制刷题计划
          </button>

  // ===== 刷题模式 =====
  startMode(mode, opts = {}) {
    const qs = QUESTION_BANK.questions || [];
    let filtered = [];

    if (mode === 'speed20') {
      filtered = [...qs].sort((a, b) => {
        const ma = Store.mastery[a.序号]?.level ?? 0;
        const mb = Store.mastery[b.序号]?.level ?? 0;
        return ma - mb;
      }).slice(0, 20);
    } else if (mode === 'wrong') {
      filtered = qs.filter(q => {
        const m = Store.mastery[q.序号];
        return m && m.wrongStreak >= 1;
      });
    } else if (mode === 'bookmark') {
      filtered = qs.filter(q => Store.mastery[q.序号]?.starred);
    } else {
      filtered = [...qs];
    }

    // Apply type filter
    if (opts.type) {
      filtered = filtered.filter(q => q.题型 === opts.type);
    }

    // Apply count limit (shuffle first)
    if (opts.count && opts.count > 0 && filtered.length > opts.count) {
      for (let i = filtered.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
      }
      filtered = filtered.slice(0, opts.count);
    }

    if (filtered.length === 0) {
      if (mode === 'wrong') App.showModal('提示', '🎉 没有错题！太棒了！');
      else if (mode === 'bookmark') App.showModal('提示', '还没有收藏过题目');
      else App.showModal('提示', '没有符合条件的题目');
      return;
    }

    // Shuffle for speed20
    if (mode === 'speed20') {
      for (let i = filtered.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
      }
    }

    this.quizState = {
      mode, questions: filtered, idx: 0, answered: false,
      selected: null, isCorrect: false,
      sessionStats: { correct: 0, wrong: 0, total: filtered.length },
      startOpts: opts, answers: {}
    };
    this.nav('quiz');
  },

  renderQuiz(opts) {
    const s = this.quizState;
    const entranceFrom = opts?.from;
    const qs = s.questions;
    if (!qs || qs.length === 0) {
      document.getElementById('app').innerHTML = `<div class="empty"><div class="icon">📭</div><p>没有题目</p></div>`;
      return;
    }
    const q = qs[s.idx];
    const m = this.getMastery(q.序号);
    const correctAns = q.正确答案;
    let isJudge = q.题型 === '判断';
    let correctSet = new Set();
    if (correctAns) {
      if (isJudge) correctSet.add(correctAns === 'true' ? '正确' : '错误');
      else correctSet = new Set(correctAns.split(',').map(x => x.trim()));
    }

    let options = [];
    if (isJudge) {
      options = [{ label: '正确', text: '正确' }, { label: '错误', text: '错误' }];
    } else {
      const keys = ['选项A','选项B','选项C','选项D','选项E','选项F'];
      options = keys.map((k,i) => ({ label: String.fromCharCode(65+i), text: q[k] })).filter(o => o.text && o.text.trim());
    }

    const typeBadge = q.题型 === '单选' ? 'badge-single' : q.题型 === '多选' ? 'badge-multi' : 'badge-judge';
    const mlPct = Math.round((m.level || 0) * 100);
    const mlClass = mlPct < 30 ? 'low' : mlPct < 70 ? 'mid' : 'high';

    // 预渲染下一题卡片（用于滑动进入）
    let nextHtml = '';
    if (s.idx < s.questions.length - 1) {
      const nq = s.questions[s.idx + 1];
      const nm = this.getMastery(nq.序号);
      const nTypeBadge = nq.题型 === '单选' ? 'badge-single' : nq.题型 === '多选' ? 'badge-multi' : 'badge-judge';
      let nOptions = [];
      if (nq.题型 === '判断') {
        nOptions = [{ label: '正确', text: '正确' }, { label: '错误', text: '错误' }];
      } else {
        const keys = ['选项A','选项B','选项C','选项D','选项E','选项F'];
        nOptions = keys.map((k,i) => ({ label: String.fromCharCode(65+i), text: nq[k] })).filter(o => o.text && o.text.trim());
      }
      const nIsJudge = nq.题型 === '判断';
      let nCorrectSet = new Set();
      if (nq.正确答案) {
        if (nIsJudge) nCorrectSet.add(nq.正确答案 === 'true' ? '正确' : '错误');
        else nCorrectSet = new Set(nq.正确答案.split(',').map(x => x.trim()));
      }
      const nCorrectAns = nq.正确答案;
      nextHtml = nOptions.map((o, i) => {
        let cls = 'disabled';
        if (nCorrectSet.has(o.label)) cls = 'correct disabled';
        return `<div class="option ${cls}"><span class="olabel">${o.label}</span><span class="otext">${o.text}</span></div>`;
      }).join('');
      nextHtml = `
        <div class="q-card q-card-next" id="qCardNext">
          <div class="meta">
            <span class="badge ${nTypeBadge}">${nq.题型}</span>
            <span class="badge" style="background:var(--card2);color:var(--text2)">第${nq.序号}题</span>
            <span style="margin-left:auto;display:flex;gap:4px">
              <button class="btn-ai-sm" onclick="App.askAI(${nq.序号})" title="AI 解析">🤖</button>
              <button class="bookmark-btn" style="margin-left:0" onclick="App.toggleBookmark(${nq.序号})">${nm.starred ? '⭐' : '☆'}</button>
            </span>
          </div>
          <div class="q-title">${nq.题目.replace(/<[^>]+>/g,'')}</div>
          <div class="options">${nextHtml}</div>
          ${s.mode === 'review' ? `
          <div class="feedback show reveal-answer" style="display:block;background:var(--correct-dim);color:var(--correct);border:1px solid rgba(16,185,129,0.2);font-weight:600;">
            📖 速览模式
          </div>` : ''}
        </div>`;
    }

    document.getElementById('app').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px">
        <span style="color:var(--text2)">${s.mode === 'review' ? '📖 复习' : ''}${s.idx + 1}/${s.sessionStats.total}</span>
        <div style="display:flex;gap:8px">
          ${s.mode === 'review' ? '' : `
          <span style="color:var(--correct)">✅${s.sessionStats.correct}</span>
          <span style="color:var(--wrong)">❌${s.sessionStats.wrong}</span>
          `}
        </div>
        <button class="btn btn-sm btn-secondary" onclick="App.quitQuiz()">${s.mode === 'review' ? '结束速览' : '退出'}</button>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${(s.idx+1)/s.sessionStats.total*100}%"></div></div>

      ${s.mode === 'wrong' ? `
      <div class="glass" style="padding:8px 12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-dim);margin-bottom:4px">
          <span>📕 错题进度</span>
          <span style="cursor:pointer" onclick="const g=document.getElementById('wrongGridBody');if(g){g.style.display=g.style.display==='none'?'flex':'none'}">切换 ▼</span>
        </div>
        <div class="qgrid-container" id="wrongGridBody" style="gap:4px">
          ${s.questions.map((q2, i) => {
            const m2 = Store.mastery[q2.序号] || {};
            let cls2 = i === s.idx ? 'selected ' : '';
            cls2 += m2.wrongStreak >= 3 ? 'deep-wrong' : 'wrong';
            return `<div class="qgrid-item ${cls2}" style="width:32px;height:32px;font-size:11px" onclick="App.wrongGridJump(${i})">${q2.序号}</div>`;
          }).join('')}
        </div>
      </div>
      ` : ''}

      <div class="q-card-wrap">
        <div class="q-card" id="qCardCurrent" style="transform:translateX(${entranceFrom === 'right' ? '60' : '0'}px)">
          <div class="meta">
            <span class="badge ${typeBadge}">${s.mode === 'review' ? '📖' : ''}${q.题型}</span>
            <span class="badge" style="background:var(--card2);color:var(--text2)">第${q.序号}题</span>
            ${s.mode === 'review' ? '' : `<span class="mastery-label">掌握度 ${mlPct}%</span>`}
            <span style="margin-left:auto;display:flex;gap:4px">
              <button class="btn-ai-sm" onclick="App.askAI(${q.序号})" title="AI 解析">🤖</button>
              <button class="bookmark-btn" style="margin-left:0" onclick="App.toggleBookmark(${q.序号})">${m.starred ? '⭐' : '☆'}</button>
            </span>
          </div>
          ${s.mode === 'review' ? '' : `<div class="mastery-bar"><div class="fill ${mlClass}" style="width:${mlPct}%"></div></div>`}
          <div class="q-title">${q.题目.replace(/<[^>]+>/g,'')}</div>

          <div class="options" id="qOptions">
            ${options.map(o => {
              let cls = '';
              const isMulti = q.题型 === '多选';
              
              if (s.answered) {
                if (correctSet.has(o.label)) cls = 'correct disabled';
                else if ((isMulti ? (Array.isArray(s.selected) && s.selected.includes(o.label)) : s.selected === o.label) && !correctSet.has(o.label)) cls = 'wrong disabled';
                else cls = 'disabled';
              } else if (isMulti && Array.isArray(s.selected) && s.selected.includes(o.label)) {
                cls = ' selected-multi';
              }
              return `<div class="option ${cls}" data-label="${o.label}" onclick="App.selectOption('${o.label}')">
                <span class="olabel">${o.label}</span><span class="otext">${o.text}</span>
              </div>`;
            }).join('')}
          </div>
          
          ${!s.answered && q.题型 === '多选' && s.mode !== 'review' ? `
            <div style="margin-top:12px;display:flex;gap:8px">
              <button class="btn btn-primary" style="flex:1" onclick="App.submitMulti()">
                ✅ 提交 ${Array.isArray(s.selected) ? '(' + s.selected.length + ')' : '(0)'}
              </button>
              <button class="btn btn-secondary" style="flex:1" onclick="App.skipMulti()">
                🙈 不会 · 下一题
              </button>
            </div>
          ` : ''}

          <div class="feedback ${s.mode === 'review' ? 'show reveal-answer' : (s.answered ? 'show ' + (s.isCorrect ? 'correct' : 'wrong') : '')}" style="${s.mode === 'review' ? 'display:block;background:var(--correct-dim);color:var(--correct);border:1px solid rgba(16,185,129,0.2);font-weight:600;' : ''}">
            ${s.mode === 'review' ? `📖 正确答案：${isJudge ? (correctAns === 'true' ? '正确' : '错误') : correctAns}` : (s.answered ? (s.isCorrect ? '✅ 回答正确！' : '❌ 回答错误') : '')}
            ${s.answered && s.mode !== 'review' ? `<br><span style="font-weight:400;font-size:13px">
              正确答案：${isJudge ? (correctAns === 'true' ? '正确' : '错误') : correctAns}</span>` : ''}
          </div>
        </div>
        ${nextHtml}
      </div>

      ${s.answered ? `
        <div style="display:flex;gap:8px">
          ${s.idx > 0 ? `<button class="btn btn-secondary" style="flex:1" onclick="App.prevQuestion()">← 上一题</button>` : ''}
          <button class="btn btn-primary" style="flex:1" onclick="App.nextQuestion()">
            ${s.idx < s.questions.length - 1 ? `下一题 →` : '📊 查看总结'}
          </button>
        </div>
      ` : ''}

      ${s.mode === 'review' ? `
        <div class="review-grid" id="reviewGrid">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px;color:var(--text-dim)">快速切题</span>
            <button class="btn btn-sm btn-secondary" onclick="App.toggleReviewGrid()">${this._reviewGridOpen ? '收起 ▲' : '展开 ▼'}</button>
          </div>
          <div class="qgrid-container" id="reviewGridBody" style="${this._reviewGridOpen ? '' : 'display:none'}">
            ${s.questions.map((q2, i) => {
              const m2 = Store.mastery[q2.序号] || {};
              let cls2 = i === s.idx ? 'current ' : '';
              if (m2.starred) cls2 += 'starred ';
              return `<div class="qgrid-item ${cls2}" onclick="App.reviewJump(${i})">${q2.序号}</div>`;
            }).join('')}
          </div>
        </div>
      ` : ''}

      <div class="ai-box" id="aiBox">
        <div class="ai-header">🤖 AI 解析 <span style="font-weight:400;font-size:12px;color:var(--text-muted);cursor:pointer" onclick="document.getElementById('aiBox').classList.remove('show')">✕</span></div>
        <div class="ai-content" id="aiContent"></div>
      </div>
    `;

    // 入场动画：来自右侧的卡片（prevQuestion）slide-in
    if (entranceFrom === 'right') {
      const card = document.getElementById('qCardCurrent');
      if (card) {
        card.classList.add('snap');
        // 强制回流后触发 transition
        void card.getBoundingClientRect();
        card.style.transform = 'translateX(0)';
      }
    }

    // 左右滑动手势（仅首次渲染时绑定一次）
    const appEl = document.getElementById('app');
    if (!appEl.dataset.swipeInit) {
      const ctx = { startX: 0, startY: 0, isSwiping: false, releasing: false };
      appEl.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        ctx.startX = t.screenX;
        ctx.startY = t.screenY;
        ctx.isSwiping = false;
        ctx.releasing = false;
        App._swipeBlock = false;
        // 清除进行中的 transition
        const cur = document.getElementById('qCardCurrent');
        if (cur) { cur.classList.remove('snap'); cur.style.transform = 'translateX(0)'; }
        const next = document.getElementById('qCardNext');
        if (next) { next.classList.remove('enter'); next.style.transform = 'translateX(100%)'; next.style.opacity = '0.8'; }
      }, { passive: true });

      appEl.addEventListener('touchmove', (e) => {
        if (ctx.releasing) return;
        const t = e.changedTouches[0];
        const dx = t.screenX - ctx.startX;
        const dy = t.screenY - ctx.startY;
        // 当水平距离 > 垂直距离的 1.2 倍且水平距离 > 8px，判定为滑动
        if (!ctx.isSwiping) {
          if (Math.abs(dx) < 8 || Math.abs(dy) > Math.abs(dx) * 1.2) return;
          ctx.isSwiping = true;
        }
        e.preventDefault();

        const s = App.quizState;
        const cur = document.getElementById('qCardCurrent');
        const next = document.getElementById('qCardNext');
        if (!cur) return;

        // 阻力反馈：边界情况减弱偏移量
        let offset = dx;
        // 首题右滑或末题左滑才限制
        if (s.idx <= 0 && dx > 0) offset = dx * 0.2;
        else if (s.idx >= s.questions.length - 1 && dx < 0) offset = dx * 0.2;

        cur.style.transform = `translateX(${offset}px)`;

        // 下一张卡片跟随露出
        if (next && offset < 0) {
          const progress = Math.min(Math.abs(offset) / 400, 1);
          next.style.transform = `translateX(${100 - progress * 100}%)`;
          next.style.opacity = String(0.3 + progress * 0.7);
        }
      }, { passive: false });

      appEl.addEventListener('touchend', (e) => {
        if (ctx.releasing || !ctx.isSwiping) return;
        ctx.releasing = true;
        const dx = e.changedTouches[0].screenX - ctx.startX;
        const s = App.quizState;
        const cur = document.getElementById('qCardCurrent');
        const next = document.getElementById('qCardNext');
        if (!cur) return;

        let canLeft = s.idx < s.questions.length - 1;
        let canRight = s.idx > 0;
        let isLeft = dx < 0;
        let isRight = dx > 0;

        const cardWidth = cur.offsetWidth || 300;
        const threshold = cardWidth * 0.3;
        let absDx = Math.abs(dx);

        if (isLeft && !canLeft) absDx = Math.abs(dx * 0.2);
        if (isRight && !canRight) absDx = Math.abs(dx * 0.2);

        App._swipeBlock = true;
        const done = () => { App._swipeBlock = false; };

        if (absDx > threshold && ((isLeft && canLeft) || (isRight && canRight))) {
          if (isLeft) {
            cur.classList.add('snap');
            cur.style.transform = `translateX(${-cardWidth * 1.2}px)`;
            if (next) {
              next.classList.add('enter');
              next.style.transform = 'translateX(0)';
              next.style.opacity = '1';
            }
            setTimeout(() => { App.nextQuestion(); done(); }, 300);
          } else {
            // 右滑：微微偏移后立即渲染，新卡片从右侧滑入
            cur.classList.add('snap');
            cur.style.transform = `translateX(${cardWidth * 0.35}px)`;
            cur.style.opacity = '0.5';
            setTimeout(() => { App.prevQuestion(); done(); }, 80);
          }
        } else {
          // 未达阈值：弹回
          cur.classList.add('snap');
          cur.style.transform = 'translateX(0)';
          if (next) {
            next.classList.add('enter');
            next.style.transform = 'translateX(100%)';
            next.style.opacity = '0.8';
          }
          setTimeout(unblock, 400);
        }
      }, { passive: true });
      appEl.dataset.swipeInit = '1';
    }
  },

  selectOption(label) {
    if (this._swipeBlock) return;
    const s = this.quizState;
    if (s.answered) return;
    const q = s.questions[s.idx];
    const isMulti = q.题型 === '多选';
    
    if (isMulti) {
      // 多选题：切换选中状态
      if (!s.selected) s.selected = [];
      if (Array.isArray(s.selected)) {
        const idx = s.selected.indexOf(label);
        if (idx >= 0) s.selected.splice(idx, 1);
        else s.selected.push(label);
      }
      // 重渲染更新UI
      this.renderQuiz();
      return;
    }
    
    // 单选题/判断题：直接判定
    const isJudge = q.题型 === '判断';
    const correctAns = q.正确答案;
    let correctSet = new Set();
    if (correctAns) {
      if (isJudge) correctSet.add(correctAns === 'true' ? '正确' : '错误');
      else correctSet = new Set(correctAns.split(',').map(x => x.trim()));
    }
    s.selected = label;
    s.isCorrect = correctSet.has(label);
    s.answered = true;
    s.answers[s.idx] = { selected: s.selected, isCorrect: s.isCorrect };
    if (s.isCorrect) s.sessionStats.correct++;
    else s.sessionStats.wrong++;
    this.updateMastery(q.序号, s.isCorrect);
    const st = Store.stats;
    st.totalAnswered++;
    if (s.isCorrect) st.totalCorrect++;
    // 更新今日记录
    const today = new Date().toISOString().slice(0,10);
    if (!st.dailyLog) st.dailyLog = [];
    let dl = st.dailyLog.find(d => d.date === today);
    if (!dl) { dl = { date: today, answered: 0, correct: 0 }; st.dailyLog.push(dl); }
    dl.answered++;
    if (s.isCorrect) dl.correct++;
    Store.stats = st;
    this.saveQuizProgress();
    this.renderQuiz();
  },

  submitMulti() {
    const s = this.quizState;
    if (s.answered || !Array.isArray(s.selected) || s.selected.length === 0) return;
    const q = s.questions[s.idx];
    const correctAns = q.正确答案;
    const correctSet = new Set(correctAns ? correctAns.split(',').map(x => x.trim()) : []);
    const userSet = new Set(s.selected);
    
    // 必须完全匹配
    s.isCorrect = userSet.size === correctSet.size;
    if (s.isCorrect) {
      for (const item of userSet) {
        if (!correctSet.has(item)) { s.isCorrect = false; break; }
      }
    }
    s.answered = true;
    s.answers[s.idx] = { selected: [...s.selected], isCorrect: s.isCorrect };
    if (s.isCorrect) s.sessionStats.correct++;
    else s.sessionStats.wrong++;
    this.updateMastery(q.序号, s.isCorrect);
    const st = Store.stats;
    st.totalAnswered++;
    if (s.isCorrect) st.totalCorrect++;
    // 更新今日记录
    const today = new Date().toISOString().slice(0,10);
    if (!st.dailyLog) st.dailyLog = [];
    let dl = st.dailyLog.find(d => d.date === today);
    if (!dl) { dl = { date: today, answered: 0, correct: 0 }; st.dailyLog.push(dl); }
    dl.answered++;
    if (s.isCorrect) dl.correct++;
    Store.stats = st;
    this.saveQuizProgress();
    this.renderQuiz();
  },

  // 多选题跳过（算答错）
  skipMulti() {
    const s = this.quizState;
    if (s.answered) return;
    const q = s.questions[s.idx];
    s.selected = [];
    s.isCorrect = false;
    s.answered = true;
    s.answers[s.idx] = { selected: [], isCorrect: false };
    s.sessionStats.wrong++;
    this.updateMastery(q.序号, false);
    const st = Store.stats;
    st.totalAnswered++;
    const today = new Date().toISOString().slice(0,10);
    if (!st.dailyLog) st.dailyLog = [];
    let dl = st.dailyLog.find(d => d.date === today);
    if (!dl) { dl = { date: today, answered: 0, correct: 0 }; st.dailyLog.push(dl); }
    dl.answered++;
    Store.stats = st;
    this.saveQuizProgress();
    this.renderQuiz();
  },

  setManual(qId, val) {
    const m = this.getMastery(qId);
    m.manual = val;
    if (val === 'mastered') m.level = 1;
    else if (val === 'dontKnow') m.level = 0.1;
    Store.mastery = { ...Store.mastery, [qId]: m };
    this.renderQuiz();
  },

  nextQuestion() {
    const s = this.quizState;
    document.getElementById('aiBox')?.classList.remove('show');
    if (s.idx < s.questions.length - 1) {
      s.idx++;
      if (s.mode === 'review') {
        s.answered = true; s.selected = null;
      } else {
        s.answered = false; s.selected = null; s.isCorrect = false;
      }
      // 如果下一题是多选题，初始化selected为空数组
      const nextQ = s.questions[s.idx];
      if (nextQ && nextQ.题型 === '多选') s.selected = [];
      this.renderQuiz();
    } else {
      this.showQuizSummary();
    }
  },

  prevQuestion() {
    const s = this.quizState;
    if (s.idx <= 0) return;
    s.idx--;
    const saved = s.answers[s.idx];
    if (saved) {
      s.selected = saved.selected;
      s.isCorrect = saved.isCorrect;
    } else {
      s.selected = null;
      s.isCorrect = false;
    }
    s.answered = true;
    document.getElementById('aiBox')?.classList.remove('show');
    this.renderQuiz({ from: 'right' });
  },

  // ===== 题号总览 =====
  renderQuestionGrid(type) {
    const qs = QUESTION_BANK.questions || [];
    const m = Store.mastery;
    if (type) {
      if (type !== this._gridFilter) this._gridSelected = null;
      this._gridFilter = type;
    }
    const filterType = this._gridFilter || 'all';

    let filtered = qs;
    if (filterType !== 'all') filtered = qs.filter(q => q.题型 === filterType);

    const tabs = [
      {key:'all', label:`全部(${qs.length})`},
      {key:'单选', label:`单选(${qs.filter(q=>q.题型==='单选').length})`},
      {key:'多选', label:`多选(${qs.filter(q=>q.题型==='多选').length})`},
      {key:'判断', label:`判断(${qs.filter(q=>q.题型==='判断').length})`}
    ];

    let correctCount = 0, wrongCount = 0, unseenCount = 0, mixedCount = 0;
    const items = filtered.map(q => {
      const mastery = m[q.序号];
      if (!mastery || !mastery.attempts) { unseenCount++; return { ...q, cls: '' }; }
      if (mastery.wrongStreak >= 1) { wrongCount++; return { ...q, cls: 'wrong' }; }
      if (mastery.attempts > 0 && mastery.correct === mastery.attempts) { correctCount++; return { ...q, cls: 'correct' }; }
      mixedCount++; return { ...q, cls: 'mixed' };
    });

    document.getElementById('app').innerHTML = `
    <h3 style="font-size:16px;margin-bottom:12px">🔢 题号总览</h3>
    <div class="glass" style="padding:16px">
      <div class="qgrid-tabs">
        ${tabs.map(t => `<button class="${filterType === t.key ? 'active' : ''}" onclick="App.renderQuestionGrid('${t.key}')">${t.label}</button>`).join('')}
      </div>
      <div class="qgrid-container">
        ${items.map(q => `<div class="qgrid-item ${q.cls} ${this._gridSelected === q.序号 ? 'selected' : ''}" onclick="App.gridClick(${q.序号})">${q.序号}</div>`).join('')}
      </div>
      <div class="qgrid-legend">
        <span><span class="dot dot-correct"></span> 对 ${correctCount}</span>
        <span><span class="dot dot-wrong"></span> 错 ${wrongCount}</span>
        <span><span class="dot dot-mixed"></span> 混合 ${mixedCount}</span>
        <span><span class="dot dot-unseen"></span> 未做 ${unseenCount}</span>
      </div>
    </div>
    `;
  },

  // 题号二次确认点击
  gridClick(qId) {
    if (this._gridSelected === qId) {
      this._gridSelected = null;
      this.jumpToQuestion(qId);
    } else {
      this._gridSelected = qId;
      this.renderQuestionGrid();
    }
  },

  jumpToQuestion(qId) {
    const qs = QUESTION_BANK.questions || [];
    const idx = qs.findIndex(x => x.序号 === qId);
    if (idx >= 0) {
      this.quizState = {
        mode: 'all', questions: qs, idx: idx, answered: false,
        selected: null, isCorrect: false,
        sessionStats: { correct: 0, wrong: 0, total: qs.length },
        answers: {}
      };
      this.nav('quiz');
    }
  },

  reviewJump(idx) {
    this.quizState.idx = idx;
    this.renderQuiz();

  wrongGridJump(idx) {
    this.quizState.idx = idx;
    this.quizState.answered = false;
    this.quizState.selected = null;
    this.quizState.isCorrect = false;
    const nextQ = this.quizState.questions[idx];
    if (nextQ && nextQ.题型 === '多选') this.quizState.selected = [];

    const s = Store.settings;
    document.getElementById('app').innerHTML = `
      <h3 style="font-size:16px;margin-bottom:12px">⚙️ 设置</h3>
      
      <div class="glass">
        <div class="form-group">
          <label>🤖 DeepSeek API Key</label>
          <input type="password" id="apiKeyInput" value="${s.apiKey}" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
          <div style="font-size:11px;color:var(--text2);margin-top:4px">用于AI解析错题、生成刷题计划</div>
        </div>
        <button class="btn btn-primary btn-block" onclick="App.saveSettings()">💾 保存设置</button>
      </div>

      <div class="glass">
        <div class="setting-item">
          <div>
            <div class="si-label">每日目标</div>
            <div class="si-desc">每天刷题目标数</div>
          </div>
          <input type="number" id="dailyGoal" value="${s.dailyGoal}" style="width:70px;text-align:center">
        </div>
      </div>

      <div class="glass">
        <h4 style="font-size:14px;margin-bottom:8px">📋 题库信息</h4>
        <p style="font-size:13px;color:var(--text2)">题库：${QUESTION_BANK.title}</p>
        <p style="font-size:13px;color:var(--text2)">总题数：${QUESTION_BANK.total} 题</p>
        <p style="font-size:13px;color:var(--text2)">数据更新时间：${QUESTION_BANK.timestamp}</p>
      </div>
    `;
  },

  saveSettings() {
    const s = Store.settings;
    s.apiKey = document.getElementById('apiKeyInput')?.value || '';
    s.dailyGoal = parseInt(document.getElementById('dailyGoal')?.value) || 50;
    Store.settings = s;
    App.showModal('✅ 设置已保存', 'DeepSeek API Key 和偏好设置已保存到本地。');
  },

  // ===== AI 功能 =====
  async askAI(qId) {
    const q = (QUESTION_BANK.questions || []).find(x => x.序号 === qId);
    if (!q) return;
    const box = document.getElementById('aiBox');
    const content = document.getElementById('aiContent');
    if (!box || !content) return;
    box.classList.add('show');
    content.innerHTML = `<div class="ai-loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    
    const correctAns = q.正确答案;
    const ansDisplay = q.题型 === '判断' ? (correctAns === 'true' ? '正确' : '错误') : correctAns;
    const optionsStr = ['选项A','选项B','选项C','选项D','选项E','选项F']
      .map(k => q[k]).filter(x => x && x.trim()).map((t,i) => `${String.fromCharCode(65+i)}. ${t}`).join('\n');
    
    const resp = await AI.call(
      `题目：${q.题目}\n选项：\n${optionsStr}\n正确答案：${ansDisplay}\n\n请帮我做两件事：\n1. 简要解释为什么这道题的正确答案是${ansDisplay}\n2. 用一个简单的记忆口诀或联想方法帮我记住这个知识点\n回答要简短精炼，适合考前快速记忆。`
    );
    content.innerHTML = resp;
  },

  async showAIPlan() {
    const m = Store.mastery;
    const qs = QUESTION_BANK.questions || [];
    const wrongTopics = qs.filter(q => (m[q.序号]?.wrongStreak || 0) >= 2).slice(0, 10);
    const masteredCount = qs.filter(q => (m[q.序号]?.level || 0) >= 0.8).length;
    const total = qs.length;
    const wrongList = wrongTopics.map(q => q.题目.replace(/<[^>]+>/g,'').slice(0, 30)).join('、');

    const prompt = `我即将参加中国近现代史纲要考试，题库共${total}题。
    目前已掌握${masteredCount}题（掌握度≥80%）。
    我经常错的题目包括：${wrongList || '暂无，想全面复习'}。
    
    请帮我生成一个3天的突击复习计划，每天约2小时。要求：
    1. 每天的学习重点
    2. 推荐的刷题策略（先刷什么题型、重点关注哪些内容）
    3. 一些快速记忆的小技巧
    简洁清晰，适合考前突击。`;

    const box = document.createElement('div');
    box.className = 'glass';
    box.innerHTML = `<div class="ai-header">🤖 AI 刷题计划</div>
      <div class="ai-loading" id="aiPlanLoading">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span style="font-size:13px;color:var(--text2);margin-left:8px">正在生成...</span>
      </div>
      <div id="aiPlanContent" style="font-size:13px;line-height:1.7;display:none"></div>`;
    
    // Insert after the card
    const cards = document.querySelectorAll('.glass');
    if (cards.length > 0) cards[cards.length - 1].after(box);
    else document.getElementById('app').appendChild(box);
    
    const resp = await AI.call(prompt);
    document.getElementById('aiPlanLoading').style.display = 'none';
    const content = document.getElementById('aiPlanContent');
    content.style.display = 'block';
    content.innerHTML = resp;
  }
};

// 初始渲染 - 从外部加载题库
loadQuestionBank();
</script>
</body>
</html>
